{% if article.tags %}
    <div class="tags-container mt-1">
        <div class="flex flex-wrap items-start justify-end gap-1">
            {% for tag in article.tags %}
                <a class="bg-transparent text-gray-400 dark:text-gray-500 border-1 border-gray-300 dark:border-gray-700 rounded-full px-1 text-xs hover:bg-gray-50 dark:hover:bg-gray-600 hover:text-gray-700 dark:hover:text-gray-200 hover:border-transparent transition duration-400" href="{{ SITEURL }}/{{ tag.url }}">
                    {{ tag | escape }}
                </a>
            {% endfor %}
        </div>
    </div>
{% endif %}
