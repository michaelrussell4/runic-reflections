name: Deploy to GitHub Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Build Tailwind CSS
        run: |
          python -m pytailwindcss -i rr-theme/static/css/tailwind-input.css -o rr-theme/static/css/tailwind.css --minify

      - name: Build Pelican site
        run: |
          python -m pelican -s publishconf.py
          mkdir -p output/theme/css
          mkdir -p output/theme/fonts
          cp rr-theme/static/css/*.css output/theme/css/
          cp -r rr-theme/static/fonts/* output/theme/fonts/ 2>/dev/null || true

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4